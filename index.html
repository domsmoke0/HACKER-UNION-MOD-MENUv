<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKER UNION Aimbot </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a15 0%, #1a0a2e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            gap: 15px;
        }

        .profile-avatar {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #b000ff 0%, #ff00ff 100%);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(180, 0, 255, 0.8);
        }

        .profile-name {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }

        .main-button {
            width: 100%;
            background: linear-gradient(135deg, #b000ff 0%, #ff00ff 100%);
            color: #fff;
            border: none;
            padding: 25px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(180, 0, 255, 0.6);
            transition: all 0.3s ease;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .main-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(180, 0, 255, 0.8);
        }

        .main-button:active {
            transform: translateY(-1px);
        }

        .main-button.loading {
            opacity: 0.8;
            pointer-events: none;
        }

        .functions-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .function-card {
            display: flex;
            align-items: center;
            gap: 15px;
            background: transparent;
            border: 2px solid #b000ff;
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(180, 0, 255, 0.3);
        }

        .function-card:hover {
            background: rgba(180, 0, 255, 0.1);
            box-shadow: 0 0 25px rgba(180, 0, 255, 0.5);
            transform: translateY(-2px);
        }

        .function-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #2d0a4d 0%, #4d1a8d 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            flex-shrink: 0;
        }

        .function-info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .function-title {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 3px;
        }

        .function-subtitle {
            font-size: 14px;
            color: #aaa;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 28px;
            flex-shrink: 0;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333;
            transition: 0.4s;
            border-radius: 28px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background: linear-gradient(90deg, #b000ff 0%, #ff00ff 100%);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        .nav-section {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .nav-button {
            flex: 1;
            padding: 18px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .nav-button-left {
            background: linear-gradient(135deg, #b000ff 0%, #ff00ff 100%);
            color: #fff;
            border-color: #b000ff;
            box-shadow: 0 5px 20px rgba(180, 0, 255, 0.5);
        }

        .nav-button-left:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(180, 0, 255, 0.7);
        }

        .nav-button-right {
            background: transparent;
            color: #fff;
            border-color: #b000ff;
        }

        .nav-button-right:hover {
            background: rgba(180, 0, 255, 0.1);
            box-shadow: 0 0 20px rgba(180, 0, 255, 0.4);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a0a2e 0%, #2d1b3d 100%);
            border: 2px solid #b000ff;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(180, 0, 255, 0.8);
        }

        .modal-header {
            font-size: 26px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 25px;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
            position: relative;
        }

        .modal-close {
            position: absolute;
            right: 0;
            top: 0;
            font-size: 32px;
            font-weight: bold;
            color: #b000ff;
            cursor: pointer;
            transition: all 0.3s ease;
            background: none;
            border: none;
        }

        .modal-close:hover {
            color: #ff00ff;
            transform: scale(1.2);
        }

        .injection-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .injection-label {
            color: #fff;
            font-weight: bold;
            font-size: 14px;
            margin-top: 15px;
        }

        .injection-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #b000ff;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
        }

        .injection-input:focus {
            outline: none;
            border-color: #ff00ff;
            background: rgba(180, 0, 255, 0.1);
            box-shadow: 0 0 15px rgba(180, 0, 255, 0.5);
        }

        .injection-input::placeholder {
            color: #666;
        }

        .injection-button {
            width: 100%;
            background: linear-gradient(135deg, #b000ff 0%, #ff00ff 100%);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(180, 0, 255, 0.4);
        }

        .injection-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(180, 0, 255, 0.6);
        }

        .status-message {
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            display: none;
            margin-top: 10px;
        }

        .status-message.success {
            background: rgba(0, 255, 0, 0.2);
            color: #00ff00;
            display: block;
            border: 1px solid #00ff00;
        }

        .status-message.error {
            background: rgba(255, 0, 0, 0.2);
            color: #ff6b6b;
            display: block;
            border: 1px solid #ff6b6b;
        }

        .status-message.warning {
            background: rgba(255, 165, 0, 0.2);
            color: #ffa500;
            display: block;
            border: 1px solid #ffa500;
        }

        .status-message.info {
            background: rgba(0, 150, 255, 0.2);
            color: #00d4ff;
            display: block;
            border: 1px solid #00d4ff;
        }

        .modal-content::-webkit-scrollbar {
            width: 8px;
        }

        .modal-content::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        .modal-content::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #b000ff, #ff00ff);
            border-radius: 10px;
        }

        .modal-content::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #ff00ff, #b000ff);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="profile-avatar"></div>
            <div class="profile-name">HACKER UNION</div>
        </div>

        <button class="main-button" id="openFFButton" onclick="openFireFire()">Abrir Free Fire</button>

        <div class="functions-list">
            <div class="function-card">
                <div class="function-icon">🎯</div>
                <div class="function-info">
                    <div class="function-title">Aimbot</div>
                    <div class="function-subtitle">Mira inteligente</div>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" onchange="toggleAimbot(this)">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="function-card">
                <div class="function-icon">🏆</div>
                <div class="function-info">
                    <div class="function-title">No Recoil</div>
                    <div class="function-subtitle">Sem recuo</div>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" onchange="toggleFunction('norecoil', this)">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="function-card">
                <div class="function-icon">⚡</div>
                <div class="function-info">
                    <div class="function-title">FPS Boost</div>
                    <div class="function-subtitle">Mais fluidez</div>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" onchange="toggleFunction('fpsboost', this)">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="function-card">
                <div class="function-icon">🧠</div>
                <div class="function-info">
                    <div class="function-title">Neural Aim</div>
                    <div class="function-subtitle">Ajuste automático</div>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" onchange="toggleFunction('neuralaim', this)">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="function-card">
                <div class="function-icon">🚀</div>
                <div class="function-info">
                    <div class="function-title">Auto Performance</div>
                    <div class="function-subtitle">Desempenho máximo</div>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" onchange="toggleFunction('autoperf', this)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="nav-section">
            <button class="nav-button nav-button-left" onclick="openFunctions()">Funções</button>
            <button class="nav-button nav-button-right" onclick="openInjection()">Injeção</button>
        </div>
    </div>

    <div id="injectionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                Injeção
                <button class="modal-close" onclick="closeModal('injectionModal')">&times;</button>
            </div>

            <div class="injection-section">
                <label class="injection-label">Código para Injetar:</label>
                <textarea class="injection-input" id="injectionCode" placeholder="Cole o código aqui..." rows="8"></textarea>

                <button class="injection-button" onclick="injectCode()">Injetar Código</button>

                <div id="statusMessage" class="status-message"></div>

                <label class="injection-label">URL do Servidor:</label>
                <input type="text" class="injection-input" id="serverUrl" placeholder="Ex: http://localhost:8000">

                <button class="injection-button" onclick="connectServer()">Conectar ao Servidor</button>

                <label class="injection-label">Arquivo de Patch:</label>
                <input type="file" class="injection-input" id="patchFile" accept=".dll,.so,.apk,.jar">

                <button class="injection-button" onclick="uploadPatch()">Fazer Upload</button>
            </div>
        </div>
    </div>

    <script>
        const blacklistedNames = ["マーカス", "アシュリー", "ジャック", "Marcus", "Ashley", "Jack"];

        function isNameBlacklisted(name) {
            return blacklistedNames.includes(name);
        }

        function checkName(name) {
            if (isNameBlacklisted(name)) {
                return {
                    status: false,
                    message: `⚠️ NOME NA BLACKLIST: ${name}`,
                    allowed: false
                };
            }
            return {
                status: true,
                message: `✅ Nome permitido: ${name}`,
                allowed: true
            };
        }

        function validateAimbotTarget(playerName) {
            const check = checkName(playerName);
            console.log(`[AIMBOT] ${check.message}`);
            return check.allowed;
        }

        function openFireFire() {
            const button = document.getElementById('openFFButton');
            const isAndroid = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            button.classList.add('loading');
            button.textContent = '⏳ Abrindo...';

            setTimeout(() => {
                if (isAndroid) {
                    try {
                        window.location.href = 'intent://freefire#Intent;scheme=freefire;action=android.intent.action.VIEW;end';
                        setTimeout(() => {
                            window.location.href = 'https://play.google.com/store/apps/details?id=com.mobilegames.freefire';
                        }, 500);
                    } catch (e) {
                        window.location.href = 'https://play.google.com/store/apps/details?id=com.mobilegames.freefire';
                    }
                } else if (/Win/.test(navigator.platform)) {
                    try {
                        window.location.href = 'freefire://launch';
                        setTimeout(() => {
                            alert('❌ Free Fire não está instalado!\n\n📥 Download: https://www.freefireonline.com/');
                        }, 1000);
                    } catch (e) {
                        alert('❌ Free Fire não está instalado!\n\n📥 Download: https://www.freefireonline.com/');
                    }
                } else if (/Mac/.test(navigator.platform)) {
                    window.location.href = 'freefire://launch';
                } else {
                    window.open('https://www.freefireonline.com/', '_blank');
                }

                setTimeout(() => {
                    button.classList.remove('loading');
                    button.textContent = 'Abrir Free Fire';
                }, 3000);
            }, 500);
        }

        const functionStates = {
            aimbot: false,
            norecoil: false,
            fpsboost: false,
            neuralaim: false,
            autoperf: false
        };

        function toggleAimbot(element) {
            functionStates.aimbot = element.checked;
            const statusMsg = document.getElementById('statusMessage') || createStatusMsg();

            if (element.checked) {
                const testNames = ["Player123", "マーカス", "NormalUser"];
                let blockedCount = 0;

                testNames.forEach(name => {
                    if (!validateAimbotTarget(name)) {
                        blockedCount++;
                    }
                });

                statusMsg.textContent = `🎯 AIMBOT ATIVADO - ${blockedCount} alvo(s) bloqueado(s)`;
                statusMsg.classList.remove('error');
                statusMsg.classList.add('warning');
                statusMsg.style.display = 'block';
            } else {
                statusMsg.textContent = '🎯 AIMBOT DESATIVADO';
                statusMsg.classList.remove('warning', 'error');
                statusMsg.classList.add('success');
                statusMsg.style.display = 'block';
            }

            console.log(`[AIMBOT] Estado: ${functionStates.aimbot ? '✅ ATIVADO' : '❌ DESATIVADO'}`);
        }

        function toggleFunction(name, element) {
            functionStates[name] = element.checked;
            const status = element.checked ? '✅ ATIVADO' : '❌ DESATIVADO';
            console.log(`${name.toUpperCase()}: ${status}`);
        }

        function openFunctions() {
            alert('ℹ️ Funções:\n\n' +
                  '🎯 Aimbot - Mira inteligente com proteção contra blacklist\n' +
                  '🏆 No Recoil - Sem recuo\n' +
                  '⚡ FPS Boost - Mais fluidez\n' +
                  '🧠 Neural Aim - Ajuste automático\n' +
                  '🚀 Auto Performance - Desempenho máximo\n\n' +
                  'Use os toggles acima para ativar/desativar!');
        }

        function openInjection() {
            document.getElementById('injectionModal').classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function createStatusMsg() {
            const msg = document.createElement('div');
            msg.id = 'tempStatusMessage';
            msg.className = 'status-message';
            document.querySelector('.functions-list').appendChild(msg);
            return msg;
        }

        function
